spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/customer_support}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:pguser}
spring.datasource.password=${DB_PASSWORD:pgpassword}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=*

psql -U customer_support -d customer_support